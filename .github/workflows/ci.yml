name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

# A new push to a PR cancels the in-flight run for that branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Typecheck + tests + build
    # Depot-managed GitHub Actions runner. Single-tenant ephemeral EC2
    # per job, up to 3x faster than GitHub-hosted ubuntu-24.04, no
    # concurrency / cache / network caps. To fall back to GitHub-hosted
    # for any reason, change `depot-ubuntu-24.04` -> `ubuntu-24.04`.
    # https://depot.dev/docs/github-actions/overview
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install plugin Python test dependencies
        run: python -m pip install -r apps/hermes-plugin/dashboard/requirements-dev.txt

      - name: Typecheck
        run: bun run typecheck

      - name: Plugin typecheck
        run: bun run plugin:typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Plugin tests
        run: bun run plugin:test

      - name: Publish dry-run
        env:
          NPM_CONFIG_TOKEN: dry-run-token
        run: bun run publish:dry-run

  openrouter-live-smoke:
    name: OpenRouter live smoke (optional)
    # Live `uh adapter check openrouter` against openrouter.ai. Runs only on
    # dev/main pushes (where the secret is available) and no-ops gracefully when
    # OPENROUTER_API_KEY is unset, so the adapter ships unit-tested-only until a
    # key is configured. Set the key with `gh secret set OPENROUTER_API_KEY`.
    if: github.event_name == 'push'
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Live adapter check (skips when key absent)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "::notice::OPENROUTER_API_KEY not set; skipping openrouter live smoke."
            exit 0
          fi
          bun run build
          # `uh adapter check` exits non-zero unless the adapter is found + reachable.
          node dist/cli.js adapter check openrouter
