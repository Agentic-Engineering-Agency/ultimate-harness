name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# A new push to a PR cancels the in-flight run for that branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Typecheck + tests + build
    # Depot-managed GitHub Actions runner. Single-tenant ephemeral EC2
    # per job, up to 3x faster than GitHub-hosted ubuntu-24.04, no
    # concurrency / cache / network caps. To fall back to GitHub-hosted
    # for any reason, change `depot-ubuntu-24.04` -> `ubuntu-24.04`.
    # https://depot.dev/docs/github-actions/overview
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
