name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# A new push to a PR cancels the in-flight run for that branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Typecheck + tests + build
    # Currently using GitHub-hosted Ubuntu runners. To upgrade to Depot's
    # managed runners (up to 3x faster), install the Depot GitHub App
    # (https://depot.dev/orgs/vb9d1ktqqb/github-actions) on this repo and
    # change the line below to:
    #   runs-on: depot-ubuntu-24.04
    # No other change needed — the rest of the workflow is identical.
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
