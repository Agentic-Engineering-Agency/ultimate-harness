# Deploy the public docs site (https://uh.agenticengineering.lat) via Alchemy.
# https://alchemy.run/concepts/cli/
#
# Runner notes:
# - blacksmith-4vcpu-ubuntu-2404 (Linux): `alchemy deploy` (Bun runner is stable on CI).
# - macOS self-hosted: Bun crashes running alchemy.run.ts → apps/docs/scripts use tsx.
name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'package.json'
      - '.github/workflows/deploy-docs.yml'

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Alchemy deploy uh-docs (prod)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Bun 1.3.14 SIGABRT-panicked during `alchemy deploy` on the Linux
          # runner. Use the latest stable Bun (1.4.0 is not a published release
          # tag — setup-bun 404s on it).
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Require deploy credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
        run: |
          for secret in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID ALCHEMY_PASSWORD; do
            if [ -z "${!secret}" ]; then
              echo "$secret repository secret is required for Alchemy deploy." >&2
              exit 1
            fi
          done

      - name: Log runner (macOS vs Linux)
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.name=${{ runner.name }}"
          uname -a

      - name: Deploy with Alchemy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          # uh-docs is a single fixed-name Worker, so ephemeral CI state just
          # re-deploys/updates it by name — no orphan risk. Opt out of Alchemy's
          # CI local-state guard. (Future hardening: a CloudflareStateStore.)
          ALCHEMY_CI_STATE_STORE_CHECK: "false"
          # Rule out the telemetry path (a network/spawn during init) as the
          # crash trigger; also avoids sending CI telemetry.
          DO_NOT_TRACK: "1"
          ALCHEMY_TELEMETRY_DISABLED: "1"
        run: bash scripts/alchemy-deploy.sh prod
