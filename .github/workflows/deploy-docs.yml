# Deploy the public docs site (https://uh.agenticengineering.lat) via Alchemy.
# https://alchemy.run/concepts/cli/
name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'package.json'
      - '.github/workflows/deploy-docs.yml'

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Alchemy deploy uh-docs (prod)
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Require deploy credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
        run: |
          for secret in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID ALCHEMY_PASSWORD; do
            if [ -z "${!secret}" ]; then
              echo "$secret repository secret is required for Alchemy deploy." >&2
              exit 1
            fi
          done

      - name: Deploy with Alchemy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
        run: bunx tsx alchemy.run.ts --stage prod
