name: Publish package

on:
  pull_request:
    paths:
      - package.json
      - bun.lock
      - src/**
      - tsconfig.json
      - tsconfig.tests.json
      - .github/workflows/publish.yml
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm when true; false runs dry-run only
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  dry-run:
    name: Pack + publish dry-run
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify publish metadata
        run: bun run test -- tests/package-publish.test.ts

      - name: Publish dry-run
        env:
          NPM_CONFIG_TOKEN: dry-run-token
        run: bun run publish:dry-run

  publish:
    name: Publish to npm
    needs: dry-run
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    env:
      NPM_CONFIG_TOKEN: ${{ secrets.NPM_CONFIG_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Require npm token
        run: |
          if [ -z "$NPM_CONFIG_TOKEN" ]; then
            echo "NPM_CONFIG_TOKEN GitHub secret is required to publish @agenticengineeringagency/ultimate-harness" >&2
            exit 1
          fi

      - name: Publish package
        env:
          # `npm publish` looks up auth via `NODE_AUTH_TOKEN` when paired with
          # the registry-url it would normally write into ~/.npmrc, or via the
          # raw `npm_config_token` env var (lowercased) in newer npm versions.
          # We pass both so npm picks up whichever channel works.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_CONFIG_TOKEN }}
          npm_config_token: ${{ secrets.NPM_CONFIG_TOKEN }}
        run: |
          # `bun publish` against this scope returns a spurious 404 on the
          # registry meta-lookup even when the package + token are valid
          # (verified out-of-band: `curl https://registry.npmjs.org/@…/…`
          # returns 200 with v0.3.0 data). `npm publish` reads the same
          # token via `npm_config_token`/`NODE_AUTH_TOKEN` and uploads
          # cleanly. The dry-run job above still uses `bun publish
          # --dry-run` so we keep the bun parity check.
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" > ~/.npmrc
          # Idempotency guard: skip when this version is already on npm so
          # backfill tags and re-runs are no-ops instead of a 403 failure.
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "::notice::$PKG@$VER already published; skipping."
            exit 0
          fi
          npm publish --access public
