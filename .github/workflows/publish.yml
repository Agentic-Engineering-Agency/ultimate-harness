name: Publish package

on:
  pull_request:
    paths:
      - package.json
      - bun.lock
      - src/**
      - tsconfig.json
      - tsconfig.tests.json
      - .github/workflows/publish.yml
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm when true; false runs dry-run only
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  dry-run:
    name: Pack + publish dry-run
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify publish metadata
        run: bun run test -- tests/package-publish.test.ts

      - name: Publish dry-run
        env:
          NPM_CONFIG_TOKEN: dry-run-token
        run: bun run publish:dry-run

  publish:
    name: Publish to npm
    needs: dry-run
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 10
    env:
      NPM_CONFIG_TOKEN: ${{ secrets.NPM_CONFIG_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Require npm token
        run: |
          if [ -z "$NPM_CONFIG_TOKEN" ]; then
            echo "NPM_CONFIG_TOKEN GitHub secret is required to publish @agenticengineering/ultimate-harness" >&2
            exit 1
          fi

      - name: Publish package
        run: bun publish --access public --tolerate-republish
