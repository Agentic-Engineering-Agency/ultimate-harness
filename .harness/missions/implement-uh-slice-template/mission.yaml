schema_version: uh.mission.v0
id: implement-uh-slice-template
title: "Dogfood: canonical implement-uh-slice mission template"

workflow_profile: staged
shape: team

issue_refs:
  - provider: linear
    id: UH-126
    url: https://linear.app/agenticengineering-agency/issue/UH-126

objective: >-
  Create the canonical mission template that UH itself will use to implement
  any future UH slice (one Linear UH-NNN ticket = one mission). This is the
  first dogfood-mode mission: UH-on-UH. Success here proves the team mission
  shape (UH-72) + staged workflow profile (UH-73) can produce a usable
  artifact end-to-end without a human in the implementation loop. Failure
  here is itself the most diagnostic information available — it tells us
  which of the six gaps documented in the v0.8.0 post-mortem actually bite.

  Deliverables:
    1. examples/missions/templates/implement-uh-slice.yaml — a parameterized
       canonical mission packet that another mission author can copy and
       fill in for any UH-NNN slice. MUST use `shape: team`,
       `workflow_profile: staged`, complete `acceptance_criteria[]` block,
       and `verification.required_checks[]` that enforce typecheck + tests
       at minimum.
    2. examples/missions/templates/README.md — one-page operator guide:
       "Copy this when implementing a UH-NNN Linear slice. Substitute the
       <ALL_CAPS> placeholders. Then `uh mission run-team <id>`."

  Non-goals:
    - Implementing any real UH-NNN slice via the template (that's the next
      mission, not this one).
    - Adding `uh mission promote --pr` or Linear-state-flip (those are
      separate slices flagged in the post-mortem).
    - Changing the mission schema, staged workflow profile, or team-run.ts
      runtime. The template MUST be expressible under today's schema.

context:
  repo_root: .
  read_first:
    - src/schema/mission.ts
    - src/harness/team-run.ts
    - .harness/workflows/staged.yaml
    - examples/missions/documentation-spine.yaml
    - examples/missions/codex-e2e-smoke.yaml
    - tests/team-schema.test.ts
    - docs/ROADMAP.md
    - docs/prds/uh-roadmap-to-1.0-v1.0-prd.md
  source_links:
    - https://linear.app/agenticengineering-agency/team/UH/active

constraints:
  - The template MUST validate cleanly against MissionSchema (validateMission).
  - The template MUST NOT hardcode adapter ids that aren't in TEAM_ADAPTER_IDS.
  - The template MUST include placeholder comments (# <SLICE_ID>, # <UH-NNN>) so the copier knows what to substitute.
  - README must be ≤ 60 lines; this is a quick-reference, not a tutorial.
  - No edits to src/, only to examples/missions/templates/.
  - No new dependencies.

skills:
  required:
    - mission-packet-authoring
  suggested:
    - sdd-acceptance-criteria
    - team-shape-design

expected_outputs:
  files:
    - examples/missions/templates/implement-uh-slice.yaml
    - examples/missions/templates/README.md

acceptance_criteria:
  - id: AC-1
    description: >-
      examples/missions/templates/implement-uh-slice.yaml exists and parses
      via validateMission() without errors.
    check_command: "bun -e 'import(\"./src/schema/mission.ts\").then(async m => { const yaml = await import(\"yaml\"); const fs = await import(\"node:fs/promises\"); const doc = yaml.parse(await fs.readFile(\"examples/missions/templates/implement-uh-slice.yaml\", \"utf8\")); m.validateMission(doc); console.log(\"OK\"); })'"
  - id: AC-2
    description: >-
      The template uses shape=team and workflow_profile=staged.
    check_command: "grep -q '^shape: team' examples/missions/templates/implement-uh-slice.yaml && grep -q '^workflow_profile: staged' examples/missions/templates/implement-uh-slice.yaml"
  - id: AC-3
    description: >-
      The template includes a non-empty acceptance_criteria[] block AND a verification.required_checks[] block.
    check_command: "grep -q '^acceptance_criteria:' examples/missions/templates/implement-uh-slice.yaml && grep -q 'required_checks:' examples/missions/templates/implement-uh-slice.yaml"
  - id: AC-4
    description: >-
      examples/missions/templates/README.md exists, is ≤ 60 lines, and mentions both `shape: team` and `uh mission run-team`.
    check_command: "test -f examples/missions/templates/README.md && [ \"$(wc -l < examples/missions/templates/README.md)\" -le 60 ] && grep -q 'shape: team' examples/missions/templates/README.md && grep -q 'uh mission run-team' examples/missions/templates/README.md"
  - id: AC-5
    description: >-
      Project still typechecks after the change.
    check_command: "bun run typecheck"

sandbox:
  backend: directory

verification:
  required_checks:
    - name: typecheck
      command: "bun run typecheck"
    - name: schema-parse
      command: "bun -e 'import(\"./src/schema/mission.ts\").then(async m => { const yaml = await import(\"yaml\"); const fs = await import(\"node:fs/promises\"); const doc = yaml.parse(await fs.readFile(\"examples/missions/templates/implement-uh-slice.yaml\", \"utf8\")); m.validateMission(doc); console.log(\"OK\"); })'"
    - name: template-readme-exists
      command: "test -f examples/missions/templates/README.md"
  max_iterations: 2

team:
  workers:
    - adapter: codex
      role: template-author
      count: 1
    - adapter: oh-my-pi
      role: readme-author
      count: 1
  leader:
    adapter: hermes
    role: integrator

integration_report_path: .harness/missions/implement-uh-slice-template/team/integration-report.md
