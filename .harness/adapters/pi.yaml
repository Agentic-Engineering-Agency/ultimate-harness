schema_version: uh.adapter.v0
id: pi
name: pi
description: >-
  Runtime adapter for the vanilla `pi` agent CLI — the base CLI that oh-my-pi
  (omp) extends. Executes missions via `pi --mode json --no-session` with
  extensions/skills disabled by default for deterministic runs. Set
  `config.cli_command` if the binary is not `pi` on PATH.
  See docs/runbooks/pi-setup.md.
runtime: pi
capabilities:
  - cli-execution
  - non-interactive
  - one-shot
  - worktree-isolation
  - json-output
  - diff-output
status: active
config:
  cli_command: pi
  default_toolsets: []
  default_provider: ""
  default_model: ""
  worktree_mode: false
  pass_session_id: false
  runtime_config:
    mode: json
    thinking: ""
    allow_extensions: false
    allow_skills: false
