schema_version: uh.adapter.v0
id: codex
name: OpenAI Codex
description: >-
  Runtime adapter for the OpenAI Codex CLI. Executes missions via
  `codex exec` inside a git-worktree sandbox with --sandbox workspace-write.
  Verified against codex-cli 0.130.0 (UH-30 smoke).
  See docs/architecture/adapter-codex.md and docs/runbooks/codex-e2e-smoke.md.
runtime: codex
capabilities:
  - cli-execution
  - non-interactive
  - one-shot
  - background
  - worktree-isolation
  - json-output
  - diff-output
  - mcp-tools
  - structured-events
status: active
config:
  cli_command: codex
  default_toolsets: []
  default_provider: ""
  default_model: ""
  worktree_mode: true
  pass_session_id: false
  runtime_config:
    sandbox_mode: workspace-write
    approval_policy: never
    full_auto_compat: false
