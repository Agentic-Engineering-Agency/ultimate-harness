schema_version: uh.workflow.v0
id: research-docs
name: Research & Documentation
description: Research a topic and produce documented findings.
bmad:
  inspiration: BMAD-METHOD
  dependency: false
  roles:
    - Analyst
    - Product Manager
    - Architect
    - Scrum Master / Workflow Designer
    - Developer
    - QA / Test Architect
    - Technical Writer
  guardrails:
    - BMAD is inspiration only, not a runtime dependency.
    - Roles are hats; a single agent may play multiple roles.
    - Outputs should be traceable and reviewable.
    - Do not import BMAD-METHOD as a dependency.
phases:
  - name: research
    agent_role: researcher
    bmad_role: Analyst
    description: Research and gather information
    outputs:
      - source notes
      - pattern comparison
      - risk list
  - name: draft
    agent_role: writer
    bmad_role: Technical Writer
    description: Draft documentation
    outputs:
      - draft documentation
  - name: review
    agent_role: reviewer
    bmad_role: QA / Test Architect
    description: Review for accuracy and completeness
    outputs:
      - review notes
      - verification status
