schema_version: uh.workflow.v0
id: skill-authoring
name: Skill Authoring
description: Create or update a skill with SKILL.md and supporting files.
bmad:
  inspiration: BMAD-METHOD
  dependency: false
  roles:
    - Analyst
    - Product Manager
    - Architect
    - Scrum Master / Workflow Designer
    - Developer
    - QA / Test Architect
    - Technical Writer
  guardrails:
    - BMAD is inspiration only, not a runtime dependency.
    - Roles are hats; a single agent may play multiple roles.
    - Outputs should be traceable and reviewable.
    - Do not import BMAD-METHOD as a dependency.
phases:
  - name: draft
    agent_role: writer
    bmad_role: Technical Writer
    description: Draft SKILL.md content
    outputs:
      - draft SKILL.md
  - name: structure
    agent_role: architect
    bmad_role: Architect
    description: Create references/templates/scripts
    outputs:
      - supporting files
      - structure notes
  - name: review
    agent_role: reviewer
    bmad_role: QA / Test Architect
    description: Review for clarity and completeness
    outputs:
      - review notes
      - verification status
