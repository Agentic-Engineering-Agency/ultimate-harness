schema_version: uh.workflow.v0
id: adapter-design
name: Runtime Adapter Design
description: Design and implement a runtime adapter.
bmad:
  inspiration: BMAD-METHOD
  dependency: false
  roles:
    - Analyst
    - Product Manager
    - Architect
    - Scrum Master / Workflow Designer
    - Developer
    - QA / Test Architect
    - Technical Writer
  guardrails:
    - BMAD is inspiration only, not a runtime dependency.
    - Roles are hats; a single agent may play multiple roles.
    - Outputs should be traceable and reviewable.
    - Do not import BMAD-METHOD as a dependency.
phases:
  - name: research
    agent_role: researcher
    bmad_role: Analyst
    description: Study runtime capabilities
    outputs:
      - runtime capability notes
      - risk list
  - name: design
    agent_role: architect
    bmad_role: Architect
    description: Design adapter contract
    outputs:
      - adapter contract
      - schema and sandboxing notes
  - name: implement
    agent_role: developer
    bmad_role: Developer
    description: Implement adapter
    outputs:
      - adapter implementation
      - usage notes
  - name: test
    agent_role: reviewer
    bmad_role: QA / Test Architect
    description: Test with sample missions
    outputs:
      - sample mission test results
      - review gate decision
